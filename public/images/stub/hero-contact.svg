      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="hero-contact-pulse" cx="25%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.45)"/>
      <stop offset="100%" stop-color="rgba(16,185,129,0)"/>
    </radialGradient>
    <radialGradient id="hero-contact-spot" cx="80%" cy="65%" r="45%">
      <stop offset="0%" stop-color="rgba(45,212,191,0.35)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
