name: Production Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  guard:
    name: Validate deploy source
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    timeout-minutes: 5
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
    steps:
      - name: Validate workflow_run source
        id: workflow_run_source
        if: github.event_name == 'workflow_run'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ "$RUN_CONCLUSION" != "success" ]; then
            echo "::error::Refusing to deploy because CI concluded with '$RUN_CONCLUSION'."
            exit 1
          fi

          if [ "$RUN_EVENT" != "push" ]; then
            echo "::error::Refusing to deploy workflow_run event '$RUN_EVENT'. Production deploys require a push to main."
            exit 1
          fi

          if [ "$RUN_HEAD_BRANCH" != "main" ]; then
            echo "::error::Refusing to deploy branch '$RUN_HEAD_BRANCH'. Production deploys require main."
            exit 1
          fi

          if [ "$RUN_HEAD_REPOSITORY" != "$REPOSITORY" ]; then
            echo "::error::Refusing to deploy CI from repository '$RUN_HEAD_REPOSITORY'. Expected '$REPOSITORY'."
            exit 1
          fi

          latest_main_sha="$(git ls-remote "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          if [ -z "$latest_main_sha" ]; then
            echo "::error::Could not resolve the latest main SHA."
            exit 1
          fi

          if [ "$RUN_HEAD_SHA" != "$latest_main_sha" ]; then
            echo "::error::Refusing to deploy stale CI SHA '$RUN_HEAD_SHA'. Latest main is '$latest_main_sha'."
            exit 1
          fi

          echo "source_sha=$RUN_HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Validate manual dispatch source
        id: manual_source
        if: github.event_name == 'workflow_dispatch'
        env:
          REF: ${{ github.ref }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$REF" != "refs/heads/main" ]; then
            echo "::error::Manual production deploys must be run from main."
            exit 1
          fi

          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Export source SHA
        id: source
        env:
          MANUAL_SOURCE_SHA: ${{ steps.manual_source.outputs.source_sha }}
          WORKFLOW_RUN_SOURCE_SHA: ${{ steps.workflow_run_source.outputs.source_sha }}
        run: |
          set -euo pipefail

          source_sha="${WORKFLOW_RUN_SOURCE_SHA:-$MANUAL_SOURCE_SHA}"
          if [ -z "$source_sha" ]; then
            echo "::error::Could not determine source SHA for deployment."
            exit 1
          fi

          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Vercel
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.guard.outputs.source_sha != ''
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_CLI_VERSION: 54.17.0
    steps:
      - name: Checkout deploy source
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.guard.outputs.source_sha }}

      - name: Validate deployment configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          WORKFLOW_INTERNAL_SECRET: ${{ secrets.WORKFLOW_INTERNAL_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          VERCEL_TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG }}
          VERCEL_ENV_FILE_PRODUCTION: ${{ secrets.VERCEL_ENV_FILE_PRODUCTION }}
        run: |
          set -euo pipefail
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID DATABASE_URL DIRECT_URL WORKFLOW_INTERNAL_SECRET NEXT_PUBLIC_APP_URL VERCEL_TEAM_SLUG VERCEL_ENV_FILE_PRODUCTION; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for production deployment."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Write Vercel project link
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_NAME }}
          VERCEL_PROJECT_CREATED_AT: ${{ vars.VERCEL_PROJECT_CREATED_AT }}
          VERCEL_PROJECT_FRAMEWORK: ${{ vars.VERCEL_PROJECT_FRAMEWORK }}
          VERCEL_PROJECT_NODE_VERSION: ${{ vars.VERCEL_PROJECT_NODE_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p .vercel
          node <<'NODE'
          const fs = require('node:fs');

          const createdAt = Number(process.env.VERCEL_PROJECT_CREATED_AT || '1765103936888');

          fs.writeFileSync(
            '.vercel/project.json',
            `${JSON.stringify({
              orgId: process.env.VERCEL_ORG_ID,
              projectId: process.env.VERCEL_PROJECT_ID,
              projectName: process.env.VERCEL_PROJECT_NAME || 'catalyst-studio',
              settings: {
                createdAt,
                framework: process.env.VERCEL_PROJECT_FRAMEWORK || 'nextjs',
                devCommand: null,
                installCommand: null,
                buildCommand: null,
                outputDirectory: null,
                rootDirectory: null,
                directoryListing: false,
                nodeVersion: process.env.VERCEL_PROJECT_NODE_VERSION || '24.x',
              },
            })}\n`,
            { mode: 0o600 },
          );
          NODE

      - name: Validate Vercel project target
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_PROJECT_FRAMEWORK: ${{ vars.VERCEL_PROJECT_FRAMEWORK }}
          VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_NAME }}
          VERCEL_PROJECT_NODE_VERSION: ${{ vars.VERCEL_PROJECT_NODE_VERSION }}
          VERCEL_TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG }}
        run: |
          set -euo pipefail

          expected_name="${VERCEL_PROJECT_NAME:-catalyst-studio}"
          project_json_path="$(mktemp)"
          trap 'rm -f "$project_json_path"' EXIT

          npx --yes vercel@${VERCEL_CLI_VERSION} api \
            "/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID" \
            --scope "$VERCEL_TEAM_SLUG" \
            --token="$VERCEL_TOKEN" \
            --raw > "$project_json_path"

          PROJECT_JSON_PATH="$project_json_path" EXPECTED_NAME="$expected_name" node <<'NODE'
          const fs = require('node:fs');

          const project = JSON.parse(fs.readFileSync(process.env.PROJECT_JSON_PATH, 'utf8'));
          const expected = {
            id: process.env.VERCEL_PROJECT_ID,
            name: process.env.EXPECTED_NAME,
            accountId: process.env.VERCEL_ORG_ID,
            framework: process.env.VERCEL_PROJECT_FRAMEWORK || 'nextjs',
            nodeVersion: process.env.VERCEL_PROJECT_NODE_VERSION || '24.x',
          };

          function fail(message) {
            console.error(`::error::${message}`);
            process.exit(1);
          }

          if (project.id !== expected.id) {
            fail(`VERCEL_PROJECT_ID resolves to '${project.id || 'unknown'}', expected '${expected.id}'.`);
          }

          if (project.name !== expected.name) {
            fail(`VERCEL_PROJECT_ID points to project '${project.name || 'unknown'}', expected '${expected.name}'.`);
          }

          if (project.accountId !== expected.accountId) {
            fail(`Vercel project owner '${project.accountId || 'unknown'}' does not match VERCEL_ORG_ID.`);
          }

          if (project.framework !== expected.framework) {
            fail(`Vercel project framework '${project.framework || 'unknown'}' does not match '${expected.framework}'.`);
          }

          const projectNodeVersion = project.nodeVersion || project.settings?.nodeVersion;
          if (projectNodeVersion && projectNodeVersion !== expected.nodeVersion) {
            fail(`Vercel project Node.js version '${projectNodeVersion}' does not match '${expected.nodeVersion}'.`);
          }

          console.log(`Verified Vercel project target: ${process.env.VERCEL_TEAM_SLUG}/${project.name}.`);
          NODE

      - name: Prepare production environment file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          WORKFLOW_INTERNAL_SECRET: ${{ secrets.WORKFLOW_INTERNAL_SECRET }}
          NEXT_PUBLIC_APP_NAME: ${{ vars.NEXT_PUBLIC_APP_NAME }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          STUDIO_DISABLE_WORKFLOW_PLUGIN: ${{ vars.STUDIO_DISABLE_WORKFLOW_PLUGIN }}
          STUDIO_QUOTA_ENFORCEMENT_MODE: ${{ vars.STUDIO_QUOTA_ENFORCEMENT_MODE }}
          VERCEL_ENV_FILE_PRODUCTION: ${{ secrets.VERCEL_ENV_FILE_PRODUCTION }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const dotenv = require('dotenv');

          const parsed = dotenv.parse(process.env.VERCEL_ENV_FILE_PRODUCTION || '');
          const blockedKeys = new Set([
            'NODE_ENV',
            'NX_DAEMON',
            'TURBO_CACHE',
            'TURBO_DOWNLOAD_LOCAL_ENABLED',
            'TURBO_REMOTE_ONLY',
            'TURBO_RUN_SUMMARY',
            'VERCEL',
            'VERCEL_ENV',
            'VERCEL_OIDC_TOKEN',
            'VERCEL_PROJECT_ID',
            'VERCEL_TARGET_ENV',
            'VERCEL_TEAM_ID',
            'VERCEL_TOKEN',
            'VERCEL_URL',
          ]);

          function shouldKeep(key, value) {
            return (
              /^[A-Z0-9_]+$/.test(key) &&
              value &&
              !blockedKeys.has(key) &&
              !key.startsWith('VERCEL_GIT_')
            );
          }

          const values = {};
          for (const [key, value] of Object.entries(parsed)) {
            if (shouldKeep(key, value)) {
              values[key] = value;
            }
          }

          values.NEXT_PUBLIC_APP_URL = process.env.NEXT_PUBLIC_APP_URL;
          values.NEXT_PUBLIC_APP_NAME = process.env.NEXT_PUBLIC_APP_NAME || values.NEXT_PUBLIC_APP_NAME || 'Catalyst Studio';
          values.STUDIO_DISABLE_WORKFLOW_PLUGIN =
            process.env.STUDIO_DISABLE_WORKFLOW_PLUGIN || values.STUDIO_DISABLE_WORKFLOW_PLUGIN || 'true';
          values.STUDIO_QUOTA_ENFORCEMENT_MODE =
            process.env.STUDIO_QUOTA_ENFORCEMENT_MODE || values.STUDIO_QUOTA_ENFORCEMENT_MODE || 'log';

          const legacyPremiumAliases = {
            PREMIUM_MEDIA_STORAGE_PROVIDER: 'STUDIO_MEDIA_STORAGE_PROVIDER',
            PREMIUM_MEDIA_STORAGE_S3_ACCESS_KEY_ID: 'STUDIO_MEDIA_STORAGE_S3_ACCESS_KEY_ID',
            PREMIUM_MEDIA_STORAGE_S3_BUCKET: 'STUDIO_MEDIA_STORAGE_S3_BUCKET',
            PREMIUM_MEDIA_STORAGE_S3_ENDPOINT: 'STUDIO_MEDIA_STORAGE_S3_ENDPOINT',
            PREMIUM_MEDIA_STORAGE_S3_FORCE_PATH_STYLE: 'STUDIO_MEDIA_STORAGE_S3_FORCE_PATH_STYLE',
            PREMIUM_MEDIA_STORAGE_S3_PUBLIC_BASE_URL: 'STUDIO_MEDIA_STORAGE_S3_PUBLIC_BASE_URL',
            PREMIUM_MEDIA_STORAGE_S3_REGION: 'STUDIO_MEDIA_STORAGE_S3_REGION',
            PREMIUM_MEDIA_STORAGE_S3_SECRET_ACCESS_KEY: 'STUDIO_MEDIA_STORAGE_S3_SECRET_ACCESS_KEY',
          };

          for (const [legacyKey, studioKey] of Object.entries(legacyPremiumAliases)) {
            if (!values[studioKey] && values[legacyKey]) {
              values[studioKey] = values[legacyKey];
            }
          }

          for (const key of ['DATABASE_URL', 'DIRECT_URL', 'WORKFLOW_INTERNAL_SECRET']) {
            const secretValue = process.env[key];
            if (!secretValue) {
              throw new Error(`${key} production secret is required.`);
            }

            if (values[key] && values[key] !== secretValue) {
              throw new Error(`${key} in VERCEL_ENV_FILE_PRODUCTION must match the protected GitHub ${key} secret.`);
            }

            values[key] = secretValue;
          }

          for (const key of ['DATABASE_URL', 'DIRECT_URL', 'AUTH_SECRET', 'NEXT_PUBLIC_APP_URL', 'WORKFLOW_INTERNAL_SECRET']) {
            if (!values[key]) {
              throw new Error(`${key} is required in VERCEL_ENV_FILE_PRODUCTION or production variables.`);
            }
          }

          const mediaProvider = String(values.STUDIO_MEDIA_STORAGE_PROVIDER || '').toUpperCase();
          const allowEphemeralMediaStorage = values.STUDIO_ALLOW_EPHEMERAL_MEDIA_STORAGE === 'true';
          if ((!mediaProvider || mediaProvider === 'FILE') && !allowEphemeralMediaStorage) {
            throw new Error(
              'STUDIO_MEDIA_STORAGE_PROVIDER must be set to durable storage such as S3 for production Vercel deploys. ' +
              'FILE is local-only because Vercel filesystem writes are ephemeral.'
            );
          }

          const orderedKeys = Object.keys(values).sort();
          const dotenvLines = orderedKeys.map((key) => `${key}=${JSON.stringify(values[key])}`);
          const shellLines = orderedKeys.map((key) => {
            const quoted = String(values[key]).replace(/'/g, `'\\''`);
            return `export ${key}='${quoted}'`;
          });

          fs.mkdirSync('.vercel', { recursive: true });
          fs.writeFileSync('.env.production.local', `${dotenvLines.join('\n')}\n`, { mode: 0o600 });
          fs.writeFileSync('.vercel/.env.production.local', `${dotenvLines.join('\n')}\n`, { mode: 0o600 });
          fs.writeFileSync('.vercel/env.sh', `${shellLines.join('\n')}\n`, { mode: 0o600 });
          fs.writeFileSync('.vercel/runtime-env-names.txt', `${orderedKeys.join('\n')}\n`, { mode: 0o600 });

          console.log(`Prepared ${orderedKeys.length} production environment variables for Vercel build and deploy.`);
          NODE

      - name: Build Vercel production output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG }}
        run: |
          set -euo pipefail
          . .vercel/env.sh
          npm run db:generate
          npx --yes vercel@${VERCEL_CLI_VERSION} build --prod --scope "$VERCEL_TEAM_SLUG" --token="$VERCEL_TOKEN"

      - name: Create unaliased production deployment
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG }}
        run: |
          set -euo pipefail
          . .vercel/env.sh

          deploy_args=(--prebuilt --prod --skip-domain --scope "$VERCEL_TEAM_SLUG" --token="$VERCEL_TOKEN")
          while IFS= read -r name; do
            if [ -n "$name" ] && [ -n "${!name:-}" ]; then
              deploy_args+=(--env "$name=${!name}")
            fi
          done < .vercel/runtime-env-names.txt

          deploy_output="$(npx --yes vercel@${VERCEL_CLI_VERSION} deploy "${deploy_args[@]}")"
          printf '%s\n' "$deploy_output"

          deployment_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+' | tail -n 1)"
          if [ -z "$deployment_url" ]; then
            echo "::error::Could not determine Vercel deployment URL from CLI output."
            exit 1
          fi

          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          source_sha="$(git rev-parse HEAD)"
          {
            echo "### Vercel production deployment"
            echo
            echo "- Deployment URL: $deployment_url"
            echo "- Source SHA: $source_sha"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run production migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npm run db:generate
          npm run db:migrate:deploy

      - name: Smoke check deployment URL
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          deployment_url="${{ steps.deploy.outputs.url }}"
          base_url="${deployment_url%/}"

          curl_common=(--silent --show-error --retry 5 --retry-delay 5 --retry-connrefused --max-time 30)
          smoke_headers=()
          if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            smoke_headers+=(--header "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")
          fi

          probe_headers="$(mktemp)"
          trap 'rm -f "$probe_headers"' EXIT
          probe_status="$(
            curl "${curl_common[@]}" "${smoke_headers[@]}" \
              --output /dev/null \
              --dump-header "$probe_headers" \
              --write-out '%{http_code}' \
              "$base_url/api/auth/session"
          )"

          if [ "$probe_status" = "302" ] && grep -iq '^location: https://vercel.com/sso-api' "$probe_headers"; then
            if [ -z "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
              echo "::warning::Vercel Deployment Protection blocked the staged deployment URL. Skipping staged smoke checks because VERCEL_AUTOMATION_BYPASS_SECRET is not configured; the canonical production URL smoke check remains mandatory after promotion."
              exit 0
            fi

            echo "::error::Vercel Deployment Protection still blocked the staged deployment URL. Verify that VERCEL_AUTOMATION_BYPASS_SECRET matches an active Protection Bypass for Automation secret for this Vercel project."
            exit 1
          fi

          page_status="$(
            curl "${curl_common[@]}" "${smoke_headers[@]}" \
              --output /dev/null \
              --write-out '%{http_code}' \
              "$base_url/sign-in"
          )"

          if [ "$page_status" -lt 200 ] || [ "$page_status" -ge 400 ]; then
            echo "::error::Expected deployment sign-in page to return a 2xx/3xx status, got $page_status."
            exit 1
          fi

          auth_status="$(
            curl "${curl_common[@]}" "${smoke_headers[@]}" \
              --request POST \
              --header 'content-type: application/json' \
              --data '{"email":"ci-smoke-db-check@example.invalid","password":"not-a-real-password"}' \
              --output /dev/null \
              --write-out '%{http_code}' \
              "$base_url/api/auth/sign-in"
          )"

          if [ "$auth_status" != "401" ]; then
            echo "::error::Expected DB-backed auth smoke check to return 401 from deployment URL, got $auth_status."
            exit 1
          fi

      - name: Validate source before promotion
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          source_sha="$(git rev-parse HEAD)"
          latest_main_sha="$(git ls-remote "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          if [ -z "$latest_main_sha" ]; then
            echo "::error::Could not resolve the latest main SHA before promotion."
            exit 1
          fi

          if [ "$source_sha" != "$latest_main_sha" ]; then
            echo "::error::Refusing to promote stale deployment SHA '$source_sha'. Latest main is '$latest_main_sha'."
            exit 1
          fi

      - name: Promote production deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG }}
        run: |
          set -euo pipefail
          deployment_url="${{ steps.deploy.outputs.url }}"
          npx --yes vercel@${VERCEL_CLI_VERSION} promote "$deployment_url" --scope "$VERCEL_TEAM_SLUG" --timeout=10m --yes --token="$VERCEL_TOKEN"

      - name: Smoke check canonical production URL
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: |
          set -euo pipefail
          base_url="${NEXT_PUBLIC_APP_URL%/}"
          curl_common=(--silent --show-error --retry 5 --retry-delay 5 --retry-connrefused --max-time 30)

          page_status="$(
            curl "${curl_common[@]}" \
              --output /dev/null \
              --write-out '%{http_code}' \
              "$base_url/sign-in"
          )"

          if [ "$page_status" -lt 200 ] || [ "$page_status" -ge 400 ]; then
            echo "::error::Expected canonical sign-in page to return a 2xx/3xx status, got $page_status."
            exit 1
          fi

          auth_status="$(
            curl "${curl_common[@]}" \
              --request POST \
              --header 'content-type: application/json' \
              --data '{"email":"ci-smoke-db-check@example.invalid","password":"not-a-real-password"}' \
              --output /dev/null \
              --write-out '%{http_code}' \
              "$base_url/api/auth/sign-in"
          )"

          if [ "$auth_status" != "401" ]; then
            echo "::error::Expected DB-backed auth smoke check to return 401 from canonical URL, got $auth_status."
            exit 1
          fi
