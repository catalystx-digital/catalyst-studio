name: Deploy

on:
  pull_request:
    paths:
      - .github/workflows/deploy.yml
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - next.config.ts
      - prisma/**
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME || 'Catalyst Studio' }}
            IMPORT_MODEL_CHAIN=${{ vars.IMPORT_MODEL_CHAIN || 'x-ai/grok-4.1-fast' }}
          tags: |
            ${{ steps.meta.outputs.image }}:main
            ${{ steps.meta.outputs.sha_tag }}

  deploy-ssh:
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: github.event_name != 'pull_request'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      GITHUB_DEPLOY_ENV_B64: ${{ secrets.GITHUB_DEPLOY_ENV_B64 }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR || '/opt/catalyst-studio' }}
      DEPLOY_APP_PORT: ${{ secrets.DEPLOY_APP_PORT || '3000' }}
      IMAGE_TAG: ${{ needs.build-and-publish.outputs.sha_tag }}
    steps:
      - name: Check SSH deployment configuration
        id: config
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_PRIVATE_KEY" ] && [ -n "$GITHUB_DEPLOY_ENV_B64" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SSH deployment secrets are incomplete; image was published to GHCR only."
          fi

      - name: Configure SSH
        if: steps.config.outputs.enabled == 'true'
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Write production environment file
        if: steps.config.outputs.enabled == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_APP_DIR' && chmod 700 '$DEPLOY_APP_DIR'"
          printf '%s' "$GITHUB_DEPLOY_ENV_B64" | base64 -d > /tmp/catalyst-studio.env
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/catalyst-studio.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_APP_DIR/.env"

      - name: Run migrations and restart container
        if: steps.config.outputs.enabled == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" <<EOF
          set -euo pipefail
          docker pull "$IMAGE_TAG"
          docker run --rm --env-file "$DEPLOY_APP_DIR/.env" "$IMAGE_TAG" npm run db:migrate:deploy
          docker stop catalyst-studio || true
          docker rm catalyst-studio || true
          docker run -d \
            --name catalyst-studio \
            --restart unless-stopped \
            --env-file "$DEPLOY_APP_DIR/.env" \
            -p "$DEPLOY_APP_PORT:3000" \
            "$IMAGE_TAG"
          docker image prune -f
          EOF
