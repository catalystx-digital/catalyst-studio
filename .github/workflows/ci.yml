name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SKIP_DB_SETUP: "true"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/catalyst_studio"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/catalyst_studio"
      IMPORT_MODEL_CHAIN: "x-ai/grok-4.1-fast"
      STUDIO_DISABLE_WORKFLOW_PLUGIN: "true"
      WORKFLOW_INTERNAL_SECRET: "ci-workflow-internal-secret"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Generate component registry
        run: npm run build:components

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: STUDIO_DISABLE_WORKFLOW_PLUGIN=true npm run build

  quickstart:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Verify Docker quickstart
        run: npm run verify:quickstart
