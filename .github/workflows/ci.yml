name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      SKIP_DB_SETUP: "true"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/catalyst_studio"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate component registry
        run: npm run build:components

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build
