name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SKIP_DB_SETUP: "true"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/catalyst_studio"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/catalyst_studio"
      IMPORT_MODEL_CHAIN: "x-ai/grok-4.1-fast"
      STUDIO_DISABLE_WORKFLOW_PLUGIN: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate component registry
        run: npm run build:components

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

  quickstart:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Docker quickstart
        run: npm run verify:quickstart
