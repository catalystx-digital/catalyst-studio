<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Imported website editor and preview example</title>
  <desc id="desc">A Catalyst Studio import flow showing a source website, a canvas-style editor, and a generated website preview.</desc>
