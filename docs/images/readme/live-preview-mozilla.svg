  <rect x="1552" y="16" width="92" height="36" rx="6" fill="#090909" stroke="#27272a"/>
  <text x="1598" y="39" fill="#f8fafc" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="760">Open</text>

