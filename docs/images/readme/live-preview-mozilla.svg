      <text x="216" y="352" fill="#f8fafc" font-size="20" font-weight="760">Firefox</text>
      <text x="216" y="410" fill="#a1a1aa" font-size="16">Get the gold standard for browsing with speed, privacy</text>
      <text x="216" y="436" fill="#a1a1aa" font-size="16">and control.</text>
