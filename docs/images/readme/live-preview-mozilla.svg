<svg width="1660" height="951" viewBox="0 0 1660 951" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Live preview of imported website</title>
  <desc id="desc">Catalyst Studio database-backed live preview showing an imported Mozilla example page.</desc>
  <rect width="1660" height="951" fill="#f5f5f5"/>
  <rect width="1660" height="68" fill="#181818"/>
  <text x="16" y="40" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="760">Live Preview</text>
  <rect x="129" y="23" width="87" height="20" rx="4" fill="#a1a1aa"/>
