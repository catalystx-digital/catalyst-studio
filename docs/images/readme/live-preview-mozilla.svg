    <text x="1118" y="39" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Mozilla Monitor</text>
    <text x="1255" y="39" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Firefox Relay</text>
    <text x="1374" y="39" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">MDN Plus</text>
    <text x="1475" y="39" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Thunderbird</text>
    <text x="1568" y="39" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Solo</text>

    <text x="198" y="217" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="820">Love the internet again</text>
    <text x="198" y="246" fill="#a1a1aa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Break free from big tech — our products put you in control of a safer, more private internet</text>
