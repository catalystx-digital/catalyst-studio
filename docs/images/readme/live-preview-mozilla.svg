      <text x="1128" y="352" fill="#f8fafc" font-size="20" font-weight="760">Mozilla VPN</text>
      <text x="1128" y="410" fill="#a1a1aa" font-size="16">Keep your location and online</text>
      <text x="1128" y="436" fill="#a1a1aa" font-size="16">adventures private — stream like a</text>
      <text x="1128" y="462" fill="#a1a1aa" font-size="16">local, anywhere.</text>
      <text x="1136" y="512" fill="#00d05a" font-size="15">Learn more ↗</text>

      <rect x="198" y="550" width="304" height="236" rx="7" fill="#1a1a1a" stroke="#2a2a2a"/>
      <text x="216" y="590" fill="#f8fafc" font-size="20" font-weight="760">Mozilla Monitor</text>
      <text x="216" y="646" fill="#a1a1aa" font-size="16">Get a heads-up if your personal info</text>
      <text x="216" y="672" fill="#a1a1aa" font-size="16">is at risk and lock it down like a pro.</text>
      <text x="224" y="750" fill="#00d05a" font-size="15">Learn more ↗</text>

      <rect x="502" y="550" width="304" height="236" rx="7" fill="#1a1a1a" stroke="#2a2a2a"/>
      <text x="520" y="590" fill="#f8fafc" font-size="20" font-weight="760">Firefox Relay</text>
      <text x="520" y="646" fill="#a1a1aa" font-size="16">Mask your email and phone number</text>
      <text x="520" y="672" fill="#a1a1aa" font-size="16">so you only get the messages you</text>
      <text x="520" y="698" fill="#a1a1aa" font-size="16">want.</text>
      <text x="528" y="750" fill="#00d05a" font-size="15">Learn more ↗</text>

      <rect x="806" y="550" width="304" height="236" rx="7" fill="#1a1a1a" stroke="#2a2a2a"/>
      <text x="824" y="590" fill="#f8fafc" font-size="20" font-weight="760">Solo</text>
      <text x="824" y="646" fill="#a1a1aa" font-size="16">Instantly create a beautiful website so</text>
      <text x="824" y="672" fill="#a1a1aa" font-size="16">you can grow your business.</text>
      <text x="832" y="750" fill="#00d05a" font-size="15">Learn more ↗</text>

      <rect x="1110" y="550" width="304" height="236" rx="7" fill="#1a1a1a" stroke="#2a2a2a"/>
      <text x="1128" y="590" fill="#f8fafc" font-size="20" font-weight="760">0DIN</text>
      <text x="1128" y="646" fill="#a1a1aa" font-size="16">Secure your AI by finding and fixing</text>
      <text x="1128" y="672" fill="#a1a1aa" font-size="16">GenAI vulnerabilities before attackers</text>
      <text x="1128" y="698" fill="#a1a1aa" font-size="16">do.</text>
      <text x="1136" y="750" fill="#00d05a" font-size="15">Learn more ↗</text>
