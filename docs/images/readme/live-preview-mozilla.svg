      <text x="824" y="352" fill="#f8fafc" font-size="20" font-weight="760">Thunderbird</text>
      <text x="824" y="408" fill="#a1a1aa" font-size="16">Go chaos-free with one app for all</text>
      <text x="824" y="434" fill="#a1a1aa" font-size="16">your emails, calendars and contacts.</text>
      <text x="832" y="512" fill="#00d05a" font-size="15">Learn more ↗</text>

