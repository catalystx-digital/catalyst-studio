      <stop stop-color="#111827"/>
      <stop offset="0.58" stop-color="#172033"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1440" height="760" rx="36" fill="url(#bg)"/>
  <rect x="40" y="40" width="1360" height="680" rx="28" fill="#0f172a" fill-opacity="0.58" stroke="#334155" stroke-width="1.5"/>

