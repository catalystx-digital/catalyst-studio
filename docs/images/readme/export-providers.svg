<svg width="1440" height="760" viewBox="0 0 1440 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Catalyst Studio export provider support</title>
  <desc id="desc">Provider export support list for Optimizely CMS, Kontent.ai, Contentstack, Umbraco Compose, Strapi, Contentful, and Mock Provider.</desc>
  <defs>
